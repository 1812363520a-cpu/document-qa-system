services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Document Q&A System"
      APP_ENV: "docker"
      API_PREFIX: "/api"
      LOG_LEVEL: "INFO"
      STORAGE_DIR: "/app/.data/uploads"
      DATABASE_PATH: "/app/.data/document_qa.sqlite3"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-20971520}"
      CHUNK_SIZE: "1000"
      CHUNK_OVERLAP: "200"
      RETRIEVAL_MIN_SCORE: "${RETRIEVAL_MIN_SCORE:-0.015}"
      AI_PROVIDER: "${AI_PROVIDER:-fake}"
      AI_REQUEST_TIMEOUT_SECONDS: "${AI_REQUEST_TIMEOUT_SECONDS:-30}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-v4-flash}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      OPENAI_COMPATIBLE_API_KEY: "${OPENAI_COMPATIBLE_API_KEY:-}"
      OPENAI_COMPATIBLE_MODEL: "${OPENAI_COMPATIBLE_MODEL:-gpt-4o-mini}"
      OPENAI_COMPATIBLE_BASE_URL: "${OPENAI_COMPATIBLE_BASE_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    volumes:
      - ./.data:/app/.data
